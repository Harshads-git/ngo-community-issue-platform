<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Issues - CommuniFix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="../../index.html"><i class="bi bi-hand-thumbs-up-fill"></i> CommuniFix</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="../../index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="issues.html">View Issues</a></li>
                    <li class="nav-item"><a class="nav-link" href="resolved.html">Success Stories</a></li>
                    <li class="nav-item" id="navAuthLink"><a class="btn btn-outline-light ms-2"
                            href="login.html">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="section-padding">
        <div class="container">
            <div class="text-center mb-5">
                <h1 class="display-4 fw-bold">Community Issues</h1>
                <p class="lead text-muted">Browse and filter issues reported by community members</p>
            </div>

            <!-- Filters & Sort Bar -->
            <div class="card card-custom mb-4">
                <div class="card-body">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-3">
                            <label class="form-label fw-semibold small">Category</label>
                            <select class="form-select" id="filterCategory" onchange="applyFilters()">
                                <option value="">All Categories</option>
                                <option value="infrastructure">Infrastructure</option>
                                <option value="sanitation">Sanitation</option>
                                <option value="environment">Environment</option>
                                <option value="public_safety">Public Safety</option>
                                <option value="health">Health</option>
                                <option value="education">Education</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label fw-semibold small">Status</label>
                            <select class="form-select" id="filterStatus" onchange="applyFilters()">
                                <option value="">All Status</option>
                                <option value="reported">Reported</option>
                                <option value="in_progress">In Progress</option>
                                <option value="resolved">Resolved</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label fw-semibold small">Severity</label>
                            <select class="form-select" id="filterSeverity" onchange="applyFilters()">
                                <option value="">All Severity</option>
                                <option value="critical">Critical</option>
                                <option value="high">High</option>
                                <option value="medium">Medium</option>
                                <option value="low">Low</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label fw-semibold small">Sort By</label>
                            <select class="form-select" id="sortBy" onchange="applyFilters()">
                                <option value="newest">Newest First</option>
                                <option value="oldest">Oldest First</option>
                                <option value="most_upvoted">Most Upvoted</option>
                                <option value="severity">Severity</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label fw-semibold small">Search</label>
                            <input type="text" class="form-control" id="searchInput" placeholder="Search issues..."
                                oninput="applyFilters()">
                        </div>
                    </div>
                    <div class="mt-2 d-flex justify-content-between align-items-center">
                        <small class="text-muted" id="resultCount">Loading...</small>
                        <button class="btn btn-sm btn-outline-secondary" onclick="clearFilters()">
                            <i class="bi bi-x-circle me-1"></i>Clear Filters
                        </button>
                    </div>
                </div>
            </div>

            <!-- Issues Grid -->
            <div class="row g-4" id="publicIssuesGrid">
                <div class="col-12 text-center p-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>

            <!-- No results message -->
            <div id="noResultsMsg" class="text-center py-5 d-none">
                <i class="bi bi-search display-4 text-muted"></i>
                <p class="mt-2 text-muted">No issues match your filters. <a href="#" onclick="clearFilters()">Clear
                        filters</a></p>
            </div>
        </div>
    </section>

    <script src="../../js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || 'null');
        let allIssues = []; // Store all fetched issues for client-side filtering

        // Manage auth navigation
        if (token && user) {
            document.getElementById('navAuthLink').innerHTML = `
                <a class="btn btn-outline-light ms-2" href="#" onclick="logout()">Logout</a>
                <a class="btn btn-light ms-2" href="../${user.role}/dashboard.html">My Dashboard</a>
            `;
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.reload();
        }

        document.addEventListener('DOMContentLoaded', fetchPublicIssues);

        async function fetchPublicIssues() {
            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}/api/issues`);
                const data = await response.json();
                if (data.success) {
                    allIssues = data.data;
                    applyFilters();
                }
            } catch (err) {
                console.error("Failed to load public issues:", err);
                document.getElementById('publicIssuesGrid').innerHTML = '<div class="col-12"><div class="alert alert-danger">Failed to load issues from server. The server may be starting up — please try again in a moment.</div></div>';
            }
        }

        function clearFilters() {
            document.getElementById('filterCategory').value = '';
            document.getElementById('filterStatus').value = '';
            document.getElementById('filterSeverity').value = '';
            document.getElementById('sortBy').value = 'newest';
            document.getElementById('searchInput').value = '';
            applyFilters();
        }

        function applyFilters() {
            const category = document.getElementById('filterCategory').value;
            const status = document.getElementById('filterStatus').value;
            const severity = document.getElementById('filterSeverity').value;
            const sortBy = document.getElementById('sortBy').value;
            const search = document.getElementById('searchInput').value.toLowerCase().trim();

            let filtered = allIssues.filter(issue => {
                if (category && issue.category !== category) return false;
                if (status && issue.status !== status) return false;
                if (severity && issue.severity !== severity) return false;
                if (search) {
                    const inTitle = issue.title?.toLowerCase().includes(search);
                    const inDesc = issue.description?.toLowerCase().includes(search);
                    const inLocation = issue.location?.address?.toLowerCase().includes(search);
                    if (!inTitle && !inDesc && !inLocation) return false;
                }
                return true;
            });

            // Sorting
            const severityOrder = { critical: 0, high: 1, medium: 2, low: 3 };
            filtered.sort((a, b) => {
                if (sortBy === 'newest') return new Date(b.createdAt) - new Date(a.createdAt);
                if (sortBy === 'oldest') return new Date(a.createdAt) - new Date(b.createdAt);
                if (sortBy === 'most_upvoted') return (b.upvotes?.length || 0) - (a.upvotes?.length || 0);
                if (sortBy === 'severity') return (severityOrder[a.severity] ?? 4) - (severityOrder[b.severity] ?? 4);
                return 0;
            });

            document.getElementById('resultCount').textContent = `Showing ${filtered.length} of ${allIssues.length} issues`;
            renderIssuesGrid(filtered);
        }

        function renderIssuesGrid(issues) {
            const grid = document.getElementById('publicIssuesGrid');
            const noMsg = document.getElementById('noResultsMsg');
            grid.innerHTML = '';

            if (issues.length === 0) {
                noMsg.classList.remove('d-none');
                return;
            }
            noMsg.classList.add('d-none');

            const statusColors = {
                reported: 'badge-pending',
                in_progress: 'badge-in-progress',
                resolved: 'bg-success',
                rejected: 'bg-danger'
            };

            issues.forEach(issue => {
                const date = new Date(issue.createdAt).toLocaleDateString();
                let hasUpvoted = user && issue.upvotes?.includes(user.id);
                const upvoteCount = issue.upvotes?.length || 0;
                const btnClass = hasUpvoted ? 'btn-primary' : 'btn-outline-primary';
                const upvoteIcon = hasUpvoted ? 'bi-hand-thumbs-up-fill' : 'bi-hand-thumbs-up';
                const badgeClass = statusColors[issue.status] || 'bg-secondary';
                const severityBadge = ['critical', 'high'].includes(issue.severity) ? 'bg-danger' : 'bg-warning text-dark';

                grid.innerHTML += `
                    <div class="col-lg-6">
                        <div class="card card-custom h-100">
                            <div class="card-body d-flex flex-column">
                                <div class="d-flex justify-content-between align-items-start mb-3">
                                    <h5 class="card-title mb-0">${issue.title}</h5>
                                    <span class="badge ${badgeClass}">${issue.status.replace('_', ' ').toUpperCase()}</span>
                                </div>
                                <div class="mb-3">
                                    <span class="badge bg-secondary me-2">${issue.category}</span>
                                    <span class="badge ${severityBadge}">${issue.severity} Priority</span>
                                </div>
                                <p class="card-text text-muted flex-grow-1">${issue.description}</p>

                                <div class="d-flex justify-content-between align-items-center mt-3 pt-3 border-top">
                                    <div class="text-muted small">
                                        <i class="bi bi-geo-alt-fill text-primary"></i> ${issue.location?.address || 'Unknown'}
                                        <span class="ms-3"><i class="bi bi-calendar"></i> ${date}</span>
                                    </div>
                                    <button class="btn btn-sm ${btnClass}" onclick="toggleUpvote('${issue._id}')">
                                        <i class="bi ${upvoteIcon} me-1"></i> <span id="cc-${issue._id}">${upvoteCount}</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        async function toggleUpvote(issueId) {
            if (!token) {
                alert("Please log in to upvote issues!");
                window.location.href = 'login.html';
                return;
            }
            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}/api/issues/${issueId}/upvote`, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    // Update local data and re-apply filters (no full refetch)
                    const idx = allIssues.findIndex(i => i._id === issueId);
                    if (idx !== -1) {
                        allIssues[idx] = data.data;
                    }
                    applyFilters();
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (err) {
                console.error("Failed to upvote:", err);
                alert('Could not process upvote right now.');
            }
        }
    </script>
</body>

</html>
