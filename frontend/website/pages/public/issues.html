<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Issues - CommunityConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="../../index.html"><i class="bi bi-hand-thumbs-up-fill"></i>
                CommunityConnect</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="../../index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="issues.html">View Issues</a></li>
                    <li class="nav-item"><a class="nav-link" href="resolved.html">Success Stories</a></li>
                    <li class="nav-item" id="navAuthLink"><a class="btn btn-outline-light ms-2"
                            href="login.html">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="section-padding">
        <div class="container">
            <div class="text-center mb-5">
                <h1 class="display-4  fw-bold">Community Issues</h1>
                <p class="lead text-muted">Browse active issues reported by our community members</p>
            </div>

            <!-- Map Placeholder -->
            <div class="card card-custom mb-5">
                <div class="card-body p-0">
                    <div class="map-placeholder" style="height: 400px; border-radius: 12px;">
                        <div class="text-center">
                            <i class="bi bi-geo-alt-fill display-1 text-primary mb-3"></i>
                            <h4>Interactive Map View</h4>
                            <p class="text-muted">Map integration would display issue locations here</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Filters -->
            <div class="card card-custom mb-4">
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <select class="form-select">
                                <option>All Categories</option>
                                <option>Infrastructure</option>
                                <option>Sanitation</option>
                                <option>Environment</option>
                                <option>Public Safety</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <select class="form-select">
                                <option>All Status</option>
                                <option>Pending</option>
                                <option>Verified</option>
                                <option>In Progress</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <select class="form-select">
                                <option>All Priorities</option>
                                <option>High</option>
                                <option>Medium</option>
                                <option>Low</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <input type="text" class="form-control" placeholder="Search issues...">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Issues Grid -->
            <div class="row g-4" id="publicIssuesGrid">
                <div class="col-12 text-center p-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>

            <!-- Pagination -->
            <nav class="mt-5">
                <ul class="pagination justify-content-center">
                    <li class="page-item disabled"><a class="page-link" href="#">Previous</a></li>
                    <li class="page-item active"><a class="page-link" href="#">1</a></li>
                    <li class="page-item"><a class="page-link" href="#">2</a></li>
                    <li class="page-item"><a class="page-link" href="#">3</a></li>
                    <li class="page-item"><a class="page-link" href="#">Next</a></li>
                </ul>
            </nav>
        </div>
    </section>
    <script src="../../js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || 'null');

        // Manage auth navigation visibility based on token
        if (token && user) {
            document.getElementById('navAuthLink').innerHTML = `
                <a class="btn btn-outline-light ms-2" href="#" onclick="logout()">Logout</a>
                <a class="btn btn-light ms-2" href="../${user.role}/dashboard.html">My Dashboard</a>
            `;
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.reload();
        }

        document.addEventListener('DOMContentLoaded', fetchPublicIssues);

        async function fetchPublicIssues() {
            try {
                // Public GET request
                const response = await fetch(`${CONFIG.API_BASE_URL}/api/issues`);
                const data = await response.json();

                if (data.success) {
                    renderIssuesGrid(data.data);
                }
            } catch (err) {
                console.error("Failed to load public issues:", err);
                document.getElementById('publicIssuesGrid').innerHTML = '<div class="col-12"><div class="alert alert-danger">Failed to load issues from server.</div></div>';
            }
        }

        function renderIssuesGrid(issues) {
            const grid = document.getElementById('publicIssuesGrid');
            grid.innerHTML = '';

            if (issues.length === 0) {
                grid.innerHTML = '<div class="col-12 text-center text-muted"><p>No issues reported yet.</p></div>';
                return;
            }

            issues.forEach(issue => {
                const date = new Date(issue.createdAt).toLocaleDateString();

                // Check if I upvoted this
                let hasUpvoted = false;
                if (user && issue.upvotes && issue.upvotes.includes(user.id)) {
                    hasUpvoted = true;
                }
                const upvoteCount = issue.upvotes ? issue.upvotes.length : 0;

                const btnClass = hasUpvoted ? 'btn-primary' : 'btn-outline-primary';
                const upvoteIcon = hasUpvoted ? 'bi-hand-thumbs-up-fill' : 'bi-hand-thumbs-up';

                grid.innerHTML += `
                    <div class="col-lg-6">
                        <div class="card card-custom h-100">
                            <div class="card-body d-flex flex-column">
                                <div class="d-flex justify-content-between align-items-start mb-3">
                                    <h5 class="card-title mb-0">${issue.title}</h5>
                                    <span class="badge ${issue.status === 'resolved' ? 'bg-success' : 'badge-pending'}">${issue.status.toUpperCase()}</span>
                                </div>
                                <div class="mb-3">
                                    <span class="badge bg-secondary me-2">${issue.category}</span>
                                    <span class="badge ${issue.severity === 'critical' || issue.severity === 'high' ? 'bg-danger' : 'bg-warning'}">${issue.severity} Priority</span>
                                </div>
                                <p class="card-text text-muted flex-grow-1">${issue.description}</p>
                                
                                <div class="d-flex justify-content-between align-items-center mt-3 pt-3 border-top">
                                    <div class="text-muted small">
                                        <i class="bi bi-geo-alt-fill text-primary"></i> ${issue.location?.address || 'Unknown'}
                                        <span class="ms-3"><i class="bi bi-calendar"></i> ${date}</span>
                                    </div>
                                    <button class="btn btn-sm ${btnClass}" onclick="toggleUpvote('${issue._id}')">
                                        <i class="bi ${upvoteIcon} me-1"></i> <span id="cc-${issue._id}">${upvoteCount}</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        async function toggleUpvote(issueId) {
            if (!token) {
                alert("Please log in to upvote issues!");
                window.location.href = 'login.html';
                return;
            }

            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}/api/issues/${issueId}/upvote`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Fast re-render of issues
                    fetchPublicIssues();
                } else {
                    alert('Error: ' + data.message);
                }
            } catch (err) {
                console.error("Failed to upvote:", err);
                alert('Could not process upvote right now.');
            }
        }
    </script>
</body>

</html>
