<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CommunityConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="../../index.html">
                <i class="bi bi-hand-thumbs-up-fill"></i> CommunityConnect
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="../../index.html">Home</a>
            </div>
        </div>
    </nav>

    <section class="section-padding">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-7">
                    <div class="card card-custom shadow-lg">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex p-3 mb-3">
                                    <i class="bi bi-person-circle fs-1 text-primary"></i>
                                </div>
                                <h2 class="fw-bold">Welcome Back</h2>
                                <p class="text-muted">Login to access your dashboard</p>
                            </div>
                            
                            <form>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Email Address</label>
                                    <input type="email" class="form-control form-control-lg" placeholder="Enter your email">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Password</label>
                                    <input type="password" class="form-control form-control-lg" placeholder="Enter your password">
                                </div>
                                <div class="mb-3 d-flex justify-content-between align-items-center">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="rememberMe">
                                        <label class="form-check-label" for="rememberMe">
                                            Remember me
                                        </label>
                                    </div>
                                    <a href="#" class="text-primary text-decoration-none">Forgot password?</a>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Login As</label>
                                    <select class="form-select form-select-lg">
                                        <option value="citizen">Citizen</option>
                                        <option value="ngo">NGO Coordinator</option>
                                        <option value="volunteer">Volunteer</option>
                                        <option value="partner">Partner Organization</option>
                                        <option value="donor">Donor</option>
                                        <option value="admin">Administrator</option>
                                    </select>
                                </div>
                                
                                <div class="d-grid gap-2 mb-3">
                                    <button type="button" class="btn btn-primary-custom btn-lg" onclick="handleLogin()">Login</button>
                                </div>
                                
                                <div class="text-center">
                                    <p class="text-muted mb-0">Don't have an account? <a href="register.html" class="text-primary fw-semibold text-decoration-none">Register here</a></p>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function handleLogin() {
            const role = document.querySelector('select').value;
            const rolePages = {
                'citizen': '../citizen/dashboard.html',
                'ngo': '../ngo/dashboard.html',
                'volunteer': '../volunteer/dashboard.html',
                'partner': '../partner/dashboard.html',
                'donor': '../donor/dashboard.html',
                'admin': '../admin/dashboard.html'
            };
            window.location.href = rolePages[role];
        }
    </script>
</body>
</html>
