<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CommuniFix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="../../index.html">
                <i class="bi bi-hand-thumbs-up-fill"></i> CommuniFix
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="../../index.html">Home</a>
            </div>
        </div>
    </nav>

    <section class="section-padding">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-7">
                    <div class="card card-custom shadow-lg">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex p-3 mb-3">
                                    <i class="bi bi-person-circle fs-1 text-primary"></i>
                                </div>
                                <h2 class="fw-bold">Welcome Back</h2>
                                <p class="text-muted">Login to access your dashboard</p>
                            </div>

                            <form onsubmit="handleLogin(event)">
                                <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Email Address</label>
                                    <input type="email" id="email" class="form-control form-control-lg"
                                        placeholder="Enter your email" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Password</label>
                                    <input type="password" id="password" class="form-control form-control-lg"
                                        placeholder="Enter your password" required>
                                </div>
                                <div class="mb-3 d-flex justify-content-between align-items-center">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="rememberMe">
                                        <label class="form-check-label" for="rememberMe">
                                            Remember me
                                        </label>
                                    </div>
                                    <a href="#" class="text-primary text-decoration-none">Forgot password?</a>
                                </div>

                                <div class="d-grid gap-2 mb-3">
                                    <button type="submit" class="btn btn-primary-custom btn-lg">Login</button>
                                </div>

                                <div class="text-center">
                                    <p class="text-muted mb-0">Don't have an account? <a href="register.html"
                                            class="text-primary fw-semibold text-decoration-none">Register here</a></p>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="../../js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function handleLogin(e) {
            e.preventDefault(); // Prevent page reload

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorAlert = document.getElementById('errorAlert');

            errorAlert.classList.add('d-none'); // Hide previous errors

            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Success! Save token and user details to localStorage
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // Route to correct dashboard
                    const rolePages = {
                        'citizen': '../citizen/dashboard.html',
                        'ngo': '../ngo/dashboard.html',
                        'volunteer': '../volunteer/dashboard.html',
                        'partner': '../partner/dashboard.html',
                        'donor': '../donor/dashboard.html',
                        'admin': '../admin/dashboard.html'
                    };

                    // Fallback to citizen if role is somehow unset
                    window.location.href = rolePages[data.user.role] || rolePages['citizen'];
                } else {
                    // Show API error message
                    errorAlert.textContent = data.message || 'Login failed. Please verify credentials.';
                    errorAlert.classList.remove('d-none');
                }
            } catch (err) {
                console.error('Error during login:', err);
                errorAlert.textContent = 'Server is currently unreachable. Is the backend running?';
                errorAlert.classList.remove('d-none');
            }
        }
    </script>
</body>

</html>
