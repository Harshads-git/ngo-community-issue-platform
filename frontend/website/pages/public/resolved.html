<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success Stories - CommunityConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="../../index.html"><i class="bi bi-hand-thumbs-up-fill"></i>
                CommunityConnect</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="../../index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="issues.html">View Issues</a></li>
                    <li class="nav-item"><a class="nav-link active" href="resolved.html">Success Stories</a></li>
                    <li class="nav-item" id="navAuthLink"><a class="btn btn-outline-light ms-2"
                            href="login.html">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="section-padding">
        <div class="container">
            <div class="text-center mb-5">
                <h1 class="display-4 fw-bold">Success Stories</h1>
                <p class="lead text-muted">Celebrating resolved issues and community impact</p>
            </div>

            <div class="row g-4" id="resolvedIssuesGrid">
                <!-- Dynamically populated from API -->
                <div class="col-12 text-center p-5">
                    <div class="spinner-border text-success" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="../../js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || 'null');

        if (token && user) {
            document.getElementById('navAuthLink').innerHTML = `
                <a class="btn btn-outline-light ms-2" href="#" onclick="logout()">Logout</a>
                <a class="btn btn-light ms-2" href="../${user.role}/dashboard.html">My Dashboard</a>
            `;
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.reload();
        }

        document.addEventListener('DOMContentLoaded', fetchResolvedIssues);

        async function fetchResolvedIssues() {
            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}/api/issues`);
                const data = await response.json();

                if (data.success) {
                    const resolvedOnly = data.data.filter(i => i.status === 'resolved');
                    renderResolvedGrid(resolvedOnly);
                }
            } catch (err) {
                console.error("Failed to load issues:", err);
                document.getElementById('resolvedIssuesGrid').innerHTML = '<div class="col-12"><div class="alert alert-danger">Failed to load success stories from server.</div></div>';
            }
        }

        function renderResolvedGrid(issues) {
            const grid = document.getElementById('resolvedIssuesGrid');
            grid.innerHTML = '';

            if (issues.length === 0) {
                grid.innerHTML = '<div class="col-12 text-center text-muted"><p>No success stories recorded yet. Work is ongoing!</p></div>';
                return;
            }

            issues.forEach(issue => {
                const date = new Date(issue.updatedAt || issue.createdAt).toLocaleDateString();

                // Show an image if the issue has one, else a pretty green checkmark SVG placeholder
                let imgSrc = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 250'%3E%3Crect fill='%2327ae60' width='400' height='250'/%3E%3Ctext x='50%25' y='50%25' font-size='60' text-anchor='middle' dy='.3em' fill='white'%3E✓%3C/text%3E%3C/svg%3E";
                if (issue.images && issue.images.length > 0) {
                    imgSrc = `${CONFIG.API_BASE_URL}${issue.images[0]}`;
                }

                grid.innerHTML += `
                    <div class="col-lg-4">
                        <div class="card card-custom h-100">
                            <img src="${imgSrc}" class="card-img-top" style="height: 250px; object-fit: cover;" alt="Resolved">
                            <div class="card-body d-flex flex-column">
                                <span class="badge badge-completed mb-2 align-self-start">Completed</span>
                                <h5 class="card-title">${issue.title}</h5>
                                <p class="card-text text-muted flex-grow-1">${issue.description}</p>
                                <div class="text-muted small mt-3 pt-3 border-top">
                                    <i class="bi bi-calendar-check"></i> Completed: ${date}
                                    <div class="mt-2"><i class="bi bi-geo-alt-fill text-primary"></i> ${issue.location?.address || 'City Zone'}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }
    </script>
</body>

</html>
