<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CommuniFix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="../../index.html">
                <i class="bi bi-hand-thumbs-up-fill"></i> CommuniFix
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="../../index.html">Home</a>
            </div>
        </div>
    </nav>

    <section class="section-padding">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-8">
                    <div class="card card-custom shadow-lg">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex p-3 mb-3">
                                    <i class="bi bi-person-plus-fill fs-1 text-primary"></i>
                                </div>
                                <h2 class="fw-bold">Create Account</h2>
                                <p class="text-muted">Join our community and make a difference</p>
                            </div>

                            <form id="registerForm" onsubmit="handleRegister(event)">
                                <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>
                                <div id="successAlert" class="alert alert-success d-none" role="alert">Registration
                                    successful! Redirecting...</div>

                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">First Name</label>
                                        <input type="text" id="firstName" class="form-control" placeholder="John"
                                            required>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Last Name</label>
                                        <input type="text" id="lastName" class="form-control" placeholder="Doe"
                                            required>
                                    </div>
                                </div>

                                <div class="mb-3 mt-3">
                                    <label class="form-label fw-semibold">Email Address</label>
                                    <input type="email" id="email" class="form-control"
                                        placeholder="john.doe@example.com" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Phone Number</label>
                                    <input type="tel" id="phone" class="form-control" placeholder="+1 (555) 123-4567">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Password</label>
                                    <input type="password" id="password" class="form-control"
                                        placeholder="Create a strong password" required minlength="6">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Confirm Password</label>
                                    <input type="password" id="confirmPassword" class="form-control"
                                        placeholder="Re-enter your password" required minlength="6">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Register As</label>
                                    <select class="form-select" id="roleSelect" onchange="toggleOrgFields()">
                                        <option value="citizen">Citizen</option>
                                        <option value="volunteer">Volunteer</option>
                                        <option value="ngo">NGO Coordinator</option>
                                        <option value="partner">Partner Organization</option>
                                        <option value="donor">Donor</option>
                                    </select>
                                </div>

                                <div id="orgFields" style="display: none;">
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">Organization Name</label>
                                        <input type="text" id="orgName" class="form-control"
                                            placeholder="Organization name">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">Organization Type</label>
                                        <select class="form-select" id="orgType">
                                            <option>NGO</option>
                                            <option>Government Agency</option>
                                            <option>Corporate Partner</option>
                                            <option>Community Group</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="termsCheck" required>
                                        <label class="form-check-label" for="termsCheck">
                                            I agree to the <a href="#" class="text-primary">Terms of Service</a> and <a
                                                href="#" class="text-primary">Privacy Policy</a>
                                        </label>
                                    </div>
                                </div>

                                <div class="d-grid gap-2 mb-3">
                                    <button type="submit" class="btn btn-primary-custom btn-lg">Create Account</button>
                                </div>

                                <div class="text-center">
                                    <p class="text-muted mb-0">Already have an account? <a href="login.html"
                                            class="text-primary fw-semibold text-decoration-none">Login here</a></p>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="../../js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleOrgFields() {
            const role = document.getElementById('roleSelect').value;
            const orgFields = document.getElementById('orgFields');
            if (role === 'ngo' || role === 'partner') {
                orgFields.style.display = 'block';
            } else {
                orgFields.style.display = 'none';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();

            const errorAlert = document.getElementById('errorAlert');
            const successAlert = document.getElementById('successAlert');

            errorAlert.classList.add('d-none');
            successAlert.classList.add('d-none');

            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const role = document.getElementById('roleSelect').value;

            if (password !== confirmPassword) {
                errorAlert.textContent = "Passwords do not match.";
                errorAlert.classList.remove('d-none');
                return;
            }

            try {
                // Combine first and last name for our API scheme that uses a single 'name' field
                const fullName = `${firstName} ${lastName}`;

                const response = await fetch(`${CONFIG.API_BASE_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: fullName,
                        email: email,
                        password: password,
                        role: role
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Show success
                    successAlert.classList.remove('d-none');

                    // Save token
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // Route to correct dashboard after a brief delay
                    const rolePages = {
                        'citizen': '../citizen/dashboard.html',
                        'ngo': '../ngo/dashboard.html',
                        'volunteer': '../volunteer/dashboard.html',
                        'partner': '../partner/dashboard.html',
                        'donor': '../donor/dashboard.html',
                        'admin': '../admin/dashboard.html'
                    };

                    setTimeout(() => {
                        window.location.href = rolePages[data.user.role] || rolePages['citizen'];
                    }, 1500);

                } else {
                    errorAlert.textContent = data.message || 'Registration failed. Please try again.';
                    errorAlert.classList.remove('d-none');
                }
            } catch (err) {
                console.error(err);
                errorAlert.textContent = 'Unable to reach the server. Make sure the backend is running.';
                errorAlert.classList.remove('d-none');
            }
        }
    </script>
</body>

</html>
