<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CommunityConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="../../index.html">
                <i class="bi bi-hand-thumbs-up-fill"></i> CommunityConnect
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="../../index.html">Home</a>
            </div>
        </div>
    </nav>

    <section class="section-padding">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-8">
                    <div class="card card-custom shadow-lg">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex p-3 mb-3">
                                    <i class="bi bi-person-plus-fill fs-1 text-primary"></i>
                                </div>
                                <h2 class="fw-bold">Create Account</h2>
                                <p class="text-muted">Join our community and make a difference</p>
                            </div>
                            
                            <form>
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">First Name</label>
                                        <input type="text" class="form-control" placeholder="John">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-semibold">Last Name</label>
                                        <input type="text" class="form-control" placeholder="Doe">
                                    </div>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Email Address</label>
                                    <input type="email" class="form-control" placeholder="john.doe@example.com">
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Phone Number</label>
                                    <input type="tel" class="form-control" placeholder="+1 (555) 123-4567">
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Password</label>
                                    <input type="password" class="form-control" placeholder="Create a strong password">
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Confirm Password</label>
                                    <input type="password" class="form-control" placeholder="Re-enter your password">
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Register As</label>
                                    <select class="form-select" id="roleSelect" onchange="toggleOrgFields()">
                                        <option value="citizen">Citizen</option>
                                        <option value="volunteer">Volunteer</option>
                                        <option value="ngo">NGO Coordinator</option>
                                        <option value="partner">Partner Organization</option>
                                        <option value="donor">Donor</option>
                                    </select>
                                </div>
                                
                                <div id="orgFields" style="display: none;">
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">Organization Name</label>
                                        <input type="text" class="form-control" placeholder="Organization name">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label fw-semibold">Organization Type</label>
                                        <select class="form-select">
                                            <option>NGO</option>
                                            <option>Government Agency</option>
                                            <option>Corporate Partner</option>
                                            <option>Community Group</option>
                                        </select>
                                    </div>
                                </div>
                                
                                <div class="mb-3">
                                    <div class="form-check">
                                        <input class="form-check-input" type="checkbox" id="termsCheck">
                                        <label class="form-check-label" for="termsCheck">
                                            I agree to the <a href="#" class="text-primary">Terms of Service</a> and <a href="#" class="text-primary">Privacy Policy</a>
                                        </label>
                                    </div>
                                </div>
                                
                                <div class="d-grid gap-2 mb-3">
                                    <button type="submit" class="btn btn-primary-custom btn-lg">Create Account</button>
                                </div>
                                
                                <div class="text-center">
                                    <p class="text-muted mb-0">Already have an account? <a href="login.html" class="text-primary fw-semibold text-decoration-none">Login here</a></p>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleOrgFields() {
            const role = document.getElementById('roleSelect').value;
            const orgFields = document.getElementById('orgFields');
            if (role === 'ngo' || role === 'partner') {
                orgFields.style.display = 'block';
            } else {
                orgFields.style.display = 'none';
            }
        }
    </script>
</body>
</html>
