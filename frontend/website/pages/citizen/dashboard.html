<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Dashboard - CommuniFix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">
            CommuniFix</a>
            <div class="navbar-nav ms-auto">
                <span class="nav-link text-white"><i class="bi bi-person-circle"></i> <span
                        id="userNameDisplay">Citizen</span></span>
                <a class="nav-link" href="../public/login.html">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid section-padding">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-lg-2 col-md-3 mb-4">
                <div class="dashboard-sidebar">
                    <div class="nav flex-column">
                        <a class="nav-link active" href="#"><i class="bi bi-speedometer2"></i> Dashboard</a>
                        <a class="nav-link" href="#reportModal" data-bs-toggle="modal"><i class="bi bi-plus-circle"></i>
                            Report Issue</a>
                        <a class="nav-link" href="#myIssues"><i class="bi bi-list-task"></i> My Issues</a>

                    </div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-lg-10 col-md-9">
                <h2 class="mb-4">Welcome back, <span id="userGreeting">User</span>!</h2>

                <!-- Stats -->
                <div class="row g-4 mb-4">
                    <div class="col-lg-3 col-md-6">
                        <div class="stat-card">
                            <div class="stat-icon bg-primary bg-opacity-10">
                                <i class="bi bi-file-earmark-text text-primary"></i>
                            </div>
                            <div class="stat-value">12</div>
                            <div class="stat-label">Total Reports</div>
                        </div>
                    </div>
                    <div class="col-lg-3 col-md-6">
                        <div class="stat-card">
                            <div class="stat-icon bg-warning bg-opacity-10">
                                <i class="bi bi-clock-history text-warning"></i>
                            </div>
                            <div class="stat-value">4</div>
                            <div class="stat-label">Pending</div>
                        </div>
                    </div>
                    <div class="col-lg-3 col-md-6">
                        <div class="stat-card">
                            <div class="stat-icon bg-info bg-opacity-10">
                                <i class="bi bi-arrow-repeat text-info"></i>
                            </div>
                            <div class="stat-value">3</div>
                            <div class="stat-label">In Progress</div>
                        </div>
                    </div>
                    <div class="col-lg-3 col-md-6">
                        <div class="stat-card">
                            <div class="stat-icon bg-success bg-opacity-10">
                                <i class="bi bi-check-circle text-success"></i>
                            </div>
                            <div class="stat-value">5</div>
                            <div class="stat-label">Resolved</div>
                        </div>
                    </div>
                </div>

                <!-- Quick Report Button -->
                <div class="mb-4">
                    <button class="btn btn-primary-custom btn-lg" data-bs-toggle="modal" data-bs-target="#reportModal">
                        <i class="bi bi-plus-circle me-2"></i> Report New Issue
                    </button>
                </div>

                <!-- My Issues Table -->
                <div class="card card-custom" id="myIssues">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="bi bi-list-task me-2"></i>My Reported Issues</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-custom mb-0">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Title</th>
                                        <th>Category</th>
                                        <th>Status</th>
                                        <th>Priority</th>
                                        <th>Date</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="issuesTableBody">
                                    <!-- Dynamic rows will be inserted here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Report Issue Modal -->
    <div class="modal fade" id="reportModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-white"><i class="bi bi-plus-circle me-2"></i>Report New Issue</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="reportForm" onsubmit="submitReport(event)">
                        <div id="reportAlert" class="alert d-none"></div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Issue Title</label>
                            <input type="text" id="issueTitle" class="form-control"
                                placeholder="Brief description of the issue" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Category</label>
                            <select id="issueCategory" class="form-select" required>
                                <option value="infrastructure">Infrastructure</option>
                                <option value="sanitation">Sanitation</option>
                                <option value="environment">Environment</option>
                                <option value="public_safety">Public Safety</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Description</label>
                            <textarea id="issueDescription" class="form-control" rows="4"
                                placeholder="Provide detailed description of the issue" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Location</label>
                            <input type="text" id="issueLocation" class="form-control"
                                placeholder="Enter address or location" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Upload Images (Optional)</label>
                            <input type="file" id="issueImages" class="form-control" multiple accept="image/*">
                            <small class="text-muted">You can upload up to 5 images</small>
                        </div>
                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary-custom" id="submitBtn">Submit Report</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Track Issue Modal (dynamic) -->
    <div class="modal fade" id="trackModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title text-white" id="trackModalTitle">Issue Timeline</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="trackModalBody">
                    <!-- Filled dynamically by openTrackModal() -->
                </div>
            </div>
        </div>
    </div>

    <script src="../../js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Check for token
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || 'null');

        if (!token || !user) {
            window.location.href = '../public/login.html';
        } else {
            document.getElementById('userNameDisplay').textContent = user.name;
            document.getElementById('userGreeting').textContent = user.name.split(' ')[0];
            fetchMyIssues();
        }

        async function fetchMyIssues() {
            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}/api/issues?user=${user.id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();

                if (data.success) {
                    renderIssues(data.data);
                }
            } catch (err) {
                console.error("Failed to load issues:", err);
            }
        }

        function renderIssues(issues) {
            const tableBody = document.getElementById('issuesTableBody');
            tableBody.innerHTML = '';

            if (issues.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="7" class="text-center text-muted py-4">You have not reported any issues yet.</td></tr>';
                return;
            }

            issues.forEach(issue => {
                const date = new Date(issue.createdAt).toLocaleDateString();
                let statusBadge = 'badge-pending';
                if (issue.status === 'resolved') statusBadge = 'bg-success';
                else if (issue.status === 'in_progress') statusBadge = 'bg-info bg-opacity-75';
                else if (issue.status === 'rejected') statusBadge = 'bg-danger';

                // Encode the issue safely as a data attribute
                const issueDataAttr = encodeURIComponent(JSON.stringify(issue));

                tableBody.innerHTML += `
                    <tr>
                        <td>...${issue._id.slice(-4)}</td>
                        <td>${issue.title}</td>
                        <td><span class="badge bg-secondary">${issue.category}</span></td>
                        <td><span class="badge ${statusBadge}">${issue.status.replace('_', ' ').toUpperCase()}</span></td>
                        <td><span class="badge bg-danger">${issue.severity}</span></td>
                        <td>${date}</td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary"
                                onclick="openTrackModal(decodeURIComponent('${issueDataAttr}'))">
                                Track
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        function openTrackModal(issueJson) {
            const issue = typeof issueJson === 'string' ? JSON.parse(issueJson) : issueJson;
            const reportedDate = new Date(issue.createdAt).toLocaleString();
            const reporterName = issue.user?.name || user.name;
            const ai = issue.aiClassification || {};
            const volunteer = issue.assignedTo?.name || null;

            // Determine which steps are done based on current status
            const statusOrder = ['reported', 'verified', 'in_progress', 'resolved'];
            const currentIdx = statusOrder.indexOf(issue.status);

            const steps = [
                {
                    label: 'Issue Reported',
                    desc: `Reported by ${reporterName}`,
                    time: reportedDate,
                    done: true   // always done if we see the issue
                },
                {
                    label: 'AI Classification',
                    desc: ai.predictedCategory
                        ? `Classified as ${ai.predictedCategory} — ${issue.severity} priority (${ai.confidenceScore ? Math.round(ai.confidenceScore * 100) + '% confidence' : 'N/A'})`
                        : `Category: ${issue.category} — ${issue.severity} priority`,
                    time: reportedDate,   // same moment as report (AI runs instantly)
                    done: true
                },
                {
                    label: 'NGO Verification',
                    desc: issue.status === 'reported'
                        ? 'Awaiting NGO review'
                        : `Verified — status updated to ${issue.status.replace('_', ' ')}`,
                    time: issue.status !== 'reported' ? 'After submission' : null,
                    done: issue.status !== 'reported'
                },
                {
                    label: 'Assigned to Volunteer',
                    desc: volunteer ? `Assigned to ${volunteer}` : 'Not yet assigned',
                    time: volunteer ? 'After verification' : null,
                    done: !!volunteer
                },
                {
                    label: issue.status === 'resolved' ? 'Issue Resolved ✅' : 'Work in Progress',
                    desc: issue.status === 'resolved'
                        ? 'Issue has been successfully resolved.'
                        : issue.status === 'in_progress'
                            ? `Task is currently in progress${volunteer ? ' by ' + volunteer : ''}.`
                            : 'Awaiting action.',
                    time: ['in_progress', 'resolved'].includes(issue.status) ? 'In progress' : null,
                    done: issue.status === 'resolved'
                }
            ];

            // Build modal content
            document.getElementById('trackModalTitle').textContent = `Timeline — #...${issue._id.slice(-6)}`;
            document.getElementById('trackModalBody').innerHTML = `
                <h6 class="fw-bold mb-3">${issue.title}</h6>
                <p class="text-muted small mb-3">
                    <i class="bi bi-geo-alt-fill me-1"></i>${issue.location?.address || 'Location Unknown'}
                </p>
                <div class="timeline">
                    ${steps.map(step => `
                        <div class="timeline-item ${step.done ? 'completed' : ''}">
                            <div class="timeline-content">
                                <strong>${step.label}</strong>
                                <p class="mb-0 text-muted">${step.desc}</p>
                                ${step.time ? `<small class="text-muted">${step.time}</small>` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

            // Show the modal
            const modal = new bootstrap.Modal(document.getElementById('trackModal'));
            modal.show();
        }

        async function submitReport(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const alertBox = document.getElementById('reportAlert');
            btn.disabled = true;
            btn.innerHTML = 'Submitting... <span class="spinner-border spinner-border-sm"></span>';
            alertBox.classList.add('d-none');

            const payload = {
                title: document.getElementById('issueTitle').value,
                category: document.getElementById('issueCategory').value,
                description: document.getElementById('issueDescription').value,
                location: { address: document.getElementById('issueLocation').value }
            };

            try {
                // 1. Create Issue
                let res = await fetch(`${CONFIG.API_BASE_URL}/api/issues`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });
                const issueData = await res.json();

                if (!issueData.success) throw new Error(issueData.message);

                // 2. Upload Images if any
                const files = document.getElementById('issueImages').files;
                if (files.length > 0) {
                    const formData = new FormData();
                    for (let i = 0; i < files.length; i++) {
                        formData.append('images', files[i]);
                    }

                    let uploadRes = await fetch(`${CONFIG.API_BASE_URL}/api/issues/${issueData.data._id}/photo`, {
                        method: 'PUT',
                        headers: { 'Authorization': `Bearer ${token}` },
                        body: formData
                    });
                    const uploadData = await uploadRes.json();
                    if (!uploadData.success) {
                        console.warn("Issue created, but image upload failed:", uploadData.message);
                    }
                }

                alertBox.className = 'alert alert-success mt-2';
                alertBox.textContent = "Issue Reported Successfully! AI has automatically categorized it.";
                alertBox.classList.remove('d-none');

                // Refresh list
                fetchMyIssues();

                // Reset form
                document.getElementById('reportForm').reset();
                setTimeout(() => {
                    var myModalEl = document.getElementById('reportModal');
                    var modal = bootstrap.Modal.getInstance(myModalEl);
                    if (modal) modal.hide();
                    alertBox.classList.add('d-none');
                }, 1500);

            } catch (err) {
                alertBox.className = 'alert alert-danger mt-2';
                alertBox.textContent = err.message || "Failed to submit report.";
                alertBox.classList.remove('d-none');
            }

            btn.disabled = false;
            btn.innerHTML = 'Submit Report';
        }
    </script>
</body>

</html>
