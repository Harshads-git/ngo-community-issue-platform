<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Dashboard - CommuniFix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../css/style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">
            CommuniFix</a>
            <div class="navbar-nav ms-auto">
                <span class="nav-link text-white"><i class="bi bi-person-badge"></i> <span
                        id="userNameDisplay">Volunteer Name</span></span>
                <a class="nav-link" href="../public/login.html">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid section-padding">
        <div class="row">
            <div class="col-lg-2 mb-4">
                <div class="dashboard-sidebar">
                    <div class="nav flex-column">
                        <a class="nav-link active" href="#"><i class="bi bi-speedometer2"></i> Dashboard</a>
                        <a class="nav-link" href="#assigned"><i class="bi bi-list-check"></i> My Tasks</a>
                        <a class="nav-link" href="#completed"><i class="bi bi-check-circle"></i> Completed</a>
                        <a class="nav-link" href="#"><i class="bi bi-trophy"></i> Achievements</a>
                    </div>
                </div>
            </div>

            <div class="col-lg-10">
                <h2 class="mb-4">Volunteer Dashboard</h2>

                <div class="row g-4 mb-4">
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="stat-icon bg-primary bg-opacity-10"><i class="bi bi-list-task text-primary"></i>
                            </div>
                            <div class="stat-value">8</div>
                            <div class="stat-label">Assigned Tasks</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="stat-icon bg-warning bg-opacity-10"><i class="bi bi-hourglass text-warning"></i>
                            </div>
                            <div class="stat-value">3</div>
                            <div class="stat-label">Pending</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="stat-icon bg-info bg-opacity-10"><i class="bi bi-arrow-repeat text-info"></i>
                            </div>
                            <div class="stat-value">2</div>
                            <div class="stat-label">In Progress</div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="stat-card">
                            <div class="stat-icon bg-success bg-opacity-10"><i
                                    class="bi bi-check-circle text-success"></i></div>
                            <div class="stat-value">47</div>
                            <div class="stat-label">Completed</div>
                        </div>
                    </div>
                </div>

                <div class="card card-custom mb-4" id="assigned">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="bi bi-list-check me-2"></i>Assigned Tasks</h5>
                    </div>
                    <div class="card-body" id="availableTasksList">
                        <div class="text-center p-4">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card card-custom" id="completed">
                    <div class="card-header">
                        <h5 class="mb-0">Recently Completed Tasks</h5>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-custom mb-0">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Title</th>
                                    <th>Category</th>
                                    <th>Completed Date</th>
                                    <th>Impact</th>
                                </tr>
                            </thead>
                            <tbody id="myActiveTasksList">
                                <tr>
                                    <td colspan="5" class="text-center">Loading your tasks...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../../js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || 'null');

        if (!token || !user) {
            window.location.href = '../public/login.html';
        } else {
            document.getElementById('userNameDisplay').textContent = user.name;
            fetchVolunteerData();
        }

        async function fetchVolunteerData() {
            try {
                // Fetch all issues (or active issues)
                const response = await fetch(`${CONFIG.API_BASE_URL}/api/issues`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();

                if (data.success) {
                    const issues = data.data;

                    // Tasks not yet assigned to anyone
                    const availableTasks = issues.filter(i =>
                        !i.assignedTo &&
                        (i.status === 'reported' || i.status === 'in_progress')
                    );

                    // Tasks specifically assigned to THIS volunteer
                    const myTasks = issues.filter(i =>
                        i.assignedTo &&
                        i.assignedTo._id === user.id
                    );

                    renderAvailable(availableTasks);
                    renderMyTasks(myTasks);
                }
            } catch (err) {
                console.error("Failed to load Volunteer data:", err);
            }
        }

        function renderAvailable(issues) {
            const list = document.getElementById('availableTasksList');
            list.innerHTML = '';

            if (issues.length === 0) {
                list.innerHTML = '<p class="text-muted text-center pt-3">No unassigned tasks currently available.</p>';
                return;
            }

            issues.forEach(issue => {
                const date = new Date(issue.createdAt).toLocaleString();

                let borderClass = 'border-info';
                if (issue.severity === 'critical') borderClass = 'border-danger';
                else if (issue.severity === 'high') borderClass = 'border-warning';

                list.innerHTML += `
                    <div class="card border-start ${borderClass} border-4 mb-3">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <div>
                                    <h6 class="fw-bold">#...${issue._id.substring(issue._id.length - 6)} - ${issue.title}</h6>
                                    <p class="text-muted mb-2">${issue.description}</p>
                                    <div>
                                        <span class="badge bg-danger me-2">${issue.severity} Priority</span>
                                        <span class="badge bg-info">${issue.category}</span>
                                    </div>
                                </div>
                                <span class="badge badge-pending">Unassigned</span>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <p class="mb-1"><i class="bi bi-geo-alt-fill me-2"></i>${issue.location?.address || 'Location Unknown'}</p>
                                    <p class="mb-1"><i class="bi bi-calendar me-2"></i>Reported: ${date}</p>
                                </div>
                                <div class="col-md-6 text-end d-flex align-items-end justify-content-end">
                                    <button class="btn btn-success" onclick="claimTask('${issue._id}')">Claim Task</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function renderMyTasks(myTasks) {
            const tbody = document.getElementById('myActiveTasksList');
            tbody.innerHTML = '';

            if (myTasks.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">You have no active claimed tasks</td></tr>';
                return;
            }

            myTasks.forEach(t => {
                const date = new Date(t.createdAt).toLocaleDateString();
                tbody.innerHTML += `
                    <tr>
                        <td>...${t._id.substring(t._id.length - 4)}</td>
                        <td>${t.title}</td>
                        <td><span class="badge bg-primary">${t.category}</span></td>
                        <td>${date}</td>
                        <td><span class="badge ${t.status === 'resolved' ? 'bg-success' : 'bg-warning'}">${t.status}</span></td>
                    </tr>
                `;
            });
        }

        async function claimTask(issueId) {
            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}/api/issues/${issueId}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ assignedTo: user.id })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Update successfully claimed!
                    fetchVolunteerData(); // Refresh list to move it to 'My Tasks'
                } else {
                    alert('Could not claim task: ' + data.message);
                }
            } catch (err) {
                console.error('Error claiming task:', err);
                alert('An error occurred.');
            }
        }
    </script>
</body>

</html>
